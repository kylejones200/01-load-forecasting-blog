name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff
        run: |
          python -m pip install --upgrade pip ruff
          targets=""
          for path in app tests scripts run.py; do
            [ -e "$path" ] && targets="$targets $path"
          done
          if [ -z "$targets" ]; then
            echo "No lint targets. Skipping."
            exit 0
          fi
          ruff check --select E9 $targets

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
          pytest tests/ -q
